<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crack</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="lobby">
    <div class="lobby-col lobby-col-players">
      <h2>Joueur·euse·s</h2>
      <div id="players-list"></div>
    </div>

    <div class="lobby-col lobby-col-center">
      <h1>Crack</h1>
      <p class="site-tag">.ernestie.fr</p>

      <div class="name-form">
        <input type="text" id="input-name" placeholder="Choisi un pseudo...">
        <button id="btn-change-name">Valider</button>
        <span id="name-form-bottom"></span>
      </div>
    </div>

    <div class="lobby-col lobby-col-settings">
      <div id="settings-panel"></div>
    </div>
  </div>

  <div id="game" class="hidden">
    <div id="opponents-row"></div>

    <div id="center-zone">
      <div id="center-tokens"></div>
    </div>

    <div id="my-hands"></div>

    <div id="next-turn-container"></div>

    <div id="river"></div>
  </div>

  <div id="reveal" class="hidden">
    <div id="reveal-lobby-container"></div>

    <div id="reveal-blocks"></div>

    <div id="reveal-river"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js" defer></script>
</body>

</html>
