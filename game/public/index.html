<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crack</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="lobby">
    <div class="lobby-col lobby-col-players">
      <div class="players-section">
        <h2>Joueur·euse·s</h2>
        <div id="players-list"></div>
      </div>

      <div class="spectators-section" id="spectators-section">
        <h2>Spectateur·ice·s</h2>
        <div id="spectators-list"></div>
      </div>
    </div>

    <div class="lobby-col lobby-col-center">
      <h1>Crack</h1>
      <p class="site-tag">.ernestie.fr</p>

      <button id="btn-join-game" class="btn-primary hidden">Rejoindre la partie</button>
      <button id="btn-become-spectator" class="btn-subtle hidden">Quitter la partie</button>

      <div class="avatar-picker">
        <button id="btn-avatar-prev" type="button" class="btn-subtle" aria-label="Avatar précédent">‹</button>
        <img id="avatar-picker-img" class="avatar-picker-img" alt="Votre avatar">
        <button id="btn-avatar-next" type="button" class="btn-subtle" aria-label="Avatar suivant">›</button>
      </div>

      <div class="name-form">
        <input type="text" id="input-name" placeholder="Choisi un pseudo...">
        <button id="btn-change-name">Valider</button>
      </div>
      <div id="name-form-bottom"></div>
    </div>

    <div class="lobby-col lobby-col-settings">
      <div id="settings-panel"></div>
    </div>
  </div>

  <div id="game" class="hidden">
    <div id="opponents-row"></div>

    <div id="center-zone">
      <div id="center-tokens"></div>
    </div>

    <div id="my-hands"></div>

    <div id="my-identity"></div>

    <div id="next-turn-container"></div>

    <div id="river">
      <div class="river-deck" id="river-deck">
        <div class="river-deck-face"></div>
      </div>
      <div id="river-slots"></div>
    </div>
  </div>

  <div id="reveal" class="hidden">
    <div id="reveal-lobby-container"></div>

    <div id="reveal-blocks"></div>

    <div id="reveal-river"></div>
  </div>

  <div id="chat">
    <button id="chat-toggle" type="button">
      Chat
      <span id="chat-badge" class="hidden"></span>
    </button>

    <div id="chat-preview"></div>

    <div id="chat-panel" class="hidden">
      <div id="chat-messages"></div>

      <form id="chat-form">
        <input type="text" id="chat-input" placeholder="Message..." maxlength="300" autocomplete="off">
        <button type="submit">Envoyer</button>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js" defer></script>
</body>

</html>
